apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: create-bedrock-chatbot
  title: Create Bedrock Chatbot
  description: Bootstrap a Bedrock-powered chatbot service using the platform standard starter.
  tags:
    - aws
    - bedrock
    - chatbot
    - platform
spec:
  owner: group:default/team-platform
  type: service
  parameters:
    - title: Service Metadata
      required:
        - name
        - owner
      properties:
        name:
          title: Service Name
          type: string
          description: Unique service name used for the component and AWS resources.
          pattern: '^[a-z0-9-]+$'
        owner:
          title: Owner
          type: string
          description: Backstage owner entity reference, for example `group:default/team-platform`.
          default: group:default/team-platform
        description:
          title: Description
          type: string
          description: Short description for the new chatbot service.
          default: Bedrock-powered chatbot service
    - title: AWS Configuration
      required:
        - awsRegion
        - bedrockModelId
        - dynamodbTableName
      properties:
        awsRegion:
          title: AWS Region
          type: string
          default: us-east-1
        bedrockModelId:
          title: Bedrock Model ID
          type: string
          default: anthropic.claude-v2
        dynamodbTableName:
          title: DynamoDB Table Name
          type: string
          default: chatbot-history
  steps:
    - id: fetch-base
      name: Fetch service skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          owner: ${{ parameters.owner }}
          description: ${{ parameters.description }}
          awsRegion: ${{ parameters.awsRegion }}
          bedrockModelId: ${{ parameters.bedrockModelId }}
          dynamodbTableName: ${{ parameters.dynamodbTableName }}
    - id: publish
      name: Publish repository
      action: publish:github
      input:
        description: ${{ parameters.description }}
        repoUrl: github.com?repo=${{ parameters.name }}&owner=tukue
        defaultBranch: main
    - id: register
      name: Register in catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml
  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
